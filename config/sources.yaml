# ============================================================
# Calendar Business Tagging
# ============================================================
# Keywords to auto-tag calendar events by business. Match case-insensitively
# against event summary (and location if present). Order matters when a
# summary could match multiple lists — first match wins, so put the most
# specific lists first.
#
# Expanded 2026-05-19 after start-day-team validation run #1 showed too
# many real lab/nestmate events landing in "untagged" because they used
# proper nouns (AHBD, LDX, Telcor, Gary biller, AFC, Diangelo, Goyal, etc.)
# rather than the generic words below. Add new terms as Aaron's clinic
# vocabulary grows; do NOT delete existing ones.
calendar_business_keywords:
  lab: ["lab", "lincoln", "testing", "sample", "specimen", "pathology",
        "phlebotomy", "draw", "panel", "ldx", "ahbd", "telcor", "gary biller",
        "morshed", "abid", "essen", "medicaid", "biller proposal",
        "lincoln reference", "lrl", "hui tzu", "kader", "tim eng",
        "dr ng", "dr eng office", "afc short hills", "yili", "goyal",
        "nazmul", "suleman", "suleiman", "hussain", "hussein"]
  # 2026-05-19: `tim eng` moved from dock_pro → lab (Aaron confirmed 5/13 that
  #   Tim ENG closed for the lab — the dock_pro mapping was stale).
  # `kader` is intentionally kept in BOTH lab AND ipa (see ipa list below) —
  #   he is multi-dept and should trigger disambig when his name appears,
  #   per the corrected E1 multi-keyword rule.
  ipa: ["ipa", "united", "provider network", "credentialing", "claims",
        "saipa", "sovereign", "phoenix", "healthfirst", "starling",
        "luis", "adrianova", "wayne", "spipa", "kader"]
  # 2026-05-19: `kader` added to ipa (also remains in lab). 5/14 braindump
  #   exercises the IPA context (SAIPA / Sovereign Phoenix cleanup), but
  #   the Meeting Notes routing comment retains Kader on both sides — multi-dept.
  nestmate: ["nestmate", "account", "nest", "afc", "urgent care", "diangelo",
             "d'angelo", "richard", "remzy", "rookwood", "tin",
             "gordin", "rybstein", "shapsis", "sorkin", "kiranpreet",
             "khrom", "ling cui", "alam", "main street radiology", "ahmed",
             "guerchon", "guerchin", "ilene", "cyrus", "big apple nephrology"]
  dock_pro: ["dock", "cardio", "roman", "aileen", "abos"]
  # Events matching no keyword are tagged "untagged".
  #
  # Fallback inference (applied by /start-day-team calendar-worker AFTER
  # keyword match yields untagged):
  # - Summary starts with "Visit Dr" or "Visit <Clinic>" → nestmate
  #   (default for unmatched provider visits — Aaron's nestmate route)
  # - Summary contains "Meditate", "Tea", "GYM", "Lunch", "Workout" → personal
  # - Summary contains "Workshop", "Maven", "Webinar" → personal/learning
  # See start-day-team SKILL.md Worker 1 prompt for the exact inference logic.

