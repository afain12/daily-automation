  - key: nestmate
    display_name: "Nestmate"
    is_default: false
    workspace_values:
      - "Nestmate"
    keywords:
      - nestmate
      - account
      - nest
      - afc
      - urgent care
      - diangelo
      - d'angelo
      - richard
      - remzy
      - rookwood
      - tin
      - gordin
      - rybstein
      - shapsis
      - sorkin
      - kiranpreet
      - khrom
      - ling cui
      - alam
      - main street radiology
      - ahmed
      - guerchon
      - guerchin
      - ilene
      - cyrus
      - big apple nephrology

  - key: dock_pro
    display_name: "Dock Pro / Cardio Pro"
    is_default: false
    workspace_values:
      - "Dock Pro"
    keywords:
      - dock
      - cardio
      - roman
      - aileen
      - abos

  - key: other
    display_name: "Other / Personal"
    is_default: true
    # Catch-all stream; receives anything that doesn't match another stream's
    # workspace_values or keywords. Notion option "Other" routes here directly.
    workspace_values:
      - "Other"
    keywords: []

# ============================================================
# Inheritance contract
# ============================================================
# - Daily-note department headers are rendered from `display_name` in stream order.
# - Calendar tagging walks streams in order and picks the first whose keywords
#   match the event summary. Order matters when a keyword could match multiple
#   streams (e.g. "kader" sits in both lab and ipa — lab comes first).
# - Routing inference (e.g. /capture-meeting attendee → stream) uses keywords
#   the same way: first-match-wins, in declaration order.
# - The `is_default: true` stream is the fallback when no match. Exactly one
#   stream must have it (validated by scripts/streams_check.py).
